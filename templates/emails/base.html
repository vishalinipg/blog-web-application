<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>{% block title %}TechBlogs Notification{% endblock %}</title>
    <style>
        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f8f9fc;
            margin: 0;
            padding: 40px 20px;
            color: #5a5c69;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            border-radius: 8px;
            border: 1px solid #e3e6f0;
            box-shadow: 0 4px 6px rgba(58, 59, 69, 0.05);
            overflow: hidden;
        }
        .header {
            background-color: {% block header_bg %}#4e73df{% endblock %};
            padding: 25px;
            text-align: center;
            color: #ffffff;
        }
        .header h2 {
            margin: 0;
            font-weight: 700;
        }
        .content {
            padding: 35px;
            line-height: 1.6;
        }
        .footer {
            background-color: #f8f9fc;
            padding: 20px 35px;
            text-align: center;
            font-size: 12px;
            color: #858796;
            border-top: 1px solid #e3e6f0;
        }
        {% block extra_css %}{% endblock %}
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>{% block header_title %}TechBlogs{% endblock %}</h2>
    </div>
    <div class="content">
        {% block content %}{% endblock %}
    </div>
    <div class="footer">
        <p>{% block footer_text %}Regards,<br><strong>The TechBlogs Team</strong>{% endblock %}</p>
    </div>
</div>

</body>
</html>
