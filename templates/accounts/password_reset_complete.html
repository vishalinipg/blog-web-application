{% extends 'auth_base.html' %}
{% load static %}

{% block title %}Reset Complete - TechBlogs{% endblock %}

{% block auth_content %}
<div class="text-center">
    <div class="sidebar-brand-icon text-success mb-3" style="font-size: 3.5rem;">
        <i class="fas fa-check-circle"></i>
    </div>
    <h1 class="h4 text-gray-900 mb-2 font-weight-bold">Password Reset Complete!</h1>
    <p class="mb-4 small text-gray-600">Your password has been set successfully. You can now proceed to log in with your new credentials!</p>
</div>
<hr>
<div class="text-center">
    <a class="btn btn-primary btn-user btn-block font-weight-bold shadow-sm" href="{% url 'accounts:login' %}">
        Go to Login
    </a>
</div>
{% endblock %}
